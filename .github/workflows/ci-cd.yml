name: SkyWatch CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # ← lets you run manually from GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']   # quoted string — avoids YAML parsing 3.10 as 3.1

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: skywatch_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6          # was v4

      - name: Set up Python
        uses: actions/setup-python@v6      # was v5 — Node24, avoids June 2026 deprecation
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'                     # caches dependencies between runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skywatch_test
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/skywatch_test
        run: pytest --tb=short -q
