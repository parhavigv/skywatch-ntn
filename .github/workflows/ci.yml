name: SkyWatch CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: skywatch
          POSTGRES_PASSWORD: skywatch123
          POSTGRES_DB: skywatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://skywatch:skywatch123@localhost:5432/skywatch_test
        run: alembic upgrade head

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://skywatch:skywatch123@localhost:5432/skywatch_test
        run: pytest tests/ -v --tb=short
