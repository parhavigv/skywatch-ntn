version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: skywatch_postgres
    environment:
      POSTGRES_USER: skywatch
      POSTGRES_PASSWORD: skywatch123
      POSTGRES_DB: skywatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skywatch -d skywatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: skywatch_app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://skywatch:skywatch123@postgres:5432/skywatch_db
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
